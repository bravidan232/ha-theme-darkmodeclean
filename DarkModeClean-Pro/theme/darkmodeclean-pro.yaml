DarkModeClean-Pro:
  modes:
    dark:
      lovelace-background: "center / cover no-repeat fixed url('/local/HABG_dark.png')"
      primary-background-color: "#002A3E"
      secondary-background-color: "#001D2B"
      card-background-color: "rgba(0,60,90,0.35)"
      dialog-background-color: "rgba(0,60,90,0.45)"
      md-sys-color-surface: "#002A3E"
      md-sys-color-surface-container: "#004C70"
      primary-text-color: "#FFFFFF"
      secondary-text-color: "#D9ECF7"
      sidebar-background-color: "#004C70"
      sidebar-text-color: "#FFFFFF"
      app-header-background-color: "#004C70"
      app-header-text-color: "#FFFFFF"
      divider-color: "rgba(255,255,255,0.18)"

      card-mod-card: |
        ha-card {
          backdrop-filter: blur(12px) brightness(1.1);
          background: rgba(0,60,90,0.30) !important;
          border-radius: 18px;
          border: 1px solid rgba(255,255,255,0.12);
          box-shadow: 0 4px 22px rgba(0,0,0,0.45);
          color: #ffffff !important;
        }

      card-mod-dialog: |
        ha-dialog .mdc-dialog__surface {
          backdrop-filter: blur(14px) brightness(1.1);
          background: rgba(0,60,90,0.40) !important;
          border-radius: 20px;
          border: 1px solid rgba(255,255,255,0.18);
          color: #ffffff !important;
        }

    light:
      primary-background-color: '#f0f0f0'
      card-background-color: '#ffffff'
      primary-text-color: '#000000'
